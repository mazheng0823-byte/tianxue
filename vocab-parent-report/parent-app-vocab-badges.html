<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>勋章馆 - 词汇生涯</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--primary:#4F6EF7;--purple:#7C5CFC;--success:#34C759;--warning:#F5A623;--text:#1A1A2E;--sub:#6B7280;--muted:#9CA3AF;--bg:#F5F6FA;--card:#fff;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.06)}body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#1A1A2E;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0}.device{width:390px;height:844px;border-radius:44px;overflow:hidden;background:var(--bg);position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}.status{height:54px;background:#fff;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:14px;font-weight:600}.top{height:53px;background:#fff;padding:0 16px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.back{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer}.back svg{width:20px;height:20px}.title{font-size:17px;font-weight:600;color:var(--text)}.ph{width:32px}.content{height:737px;overflow:auto;padding:16px 16px 28px}.content::-webkit-scrollbar{display:none}.hero{background:linear-gradient(135deg,#4F6EF7,#7C5CFC);border-radius:14px;padding:20px;text-align:center;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;right:-22px;top:-28px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08)}.num{font-size:36px;font-weight:800}.num span{font-size:14px;font-weight:500;opacity:.82}.label{font-size:13px;opacity:.86;margin-top:4px}.bar{height:6px;background:rgba(255,255,255,.22);border-radius:6px;overflow:hidden;margin-top:14px}.fill{height:100%;width:56%;background:#fff;border-radius:6px}.section{margin-bottom:20px}.section-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}.pill{font-size:10px;padding:2px 8px;border-radius:10px;background:#EEF1FE;color:var(--primary)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#fff;border-radius:10px;padding:14px 8px;text-align:center;box-shadow:var(--shadow);border:1px solid transparent;min-height:114px;position:relative}.card.on{background:linear-gradient(#fff,#fff) padding-box,linear-gradient(135deg,rgba(79,110,247,.32),rgba(124,92,252,.32)) border-box}.card.lock{opacity:.62}.medal{width:52px;height:52px;margin:0 auto 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff}.gold{background:linear-gradient(135deg,#F5A623,#F7C948)}.blue{background:linear-gradient(135deg,#4F6EF7,#60A5FA)}.purple{background:linear-gradient(135deg,#7C5CFC,#A78BFA)}.green{background:linear-gradient(135deg,#34C759,#6EE7B7)}.gray{background:#E5E7EB;filter:grayscale(1)}.name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3}.date{font-size:9px;color:var(--primary);margin-top:3px}.lock .date{color:var(--muted)}.share{position:absolute;right:6px;top:6px;width:20px;height:20px;border-radius:50%;background:#F5F6FA;color:var(--muted);font-size:12px;line-height:20px}.toast{position:absolute;top:82px;left:50%;transform:translateX(-50%) translateY(-15px);background:rgba(0,0,0,.82);color:#fff;border-radius:18px;padding:9px 16px;font-size:12px;opacity:0;transition:.25s;z-index:9}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="device"><div class="status"><span>9:41</span><span>5G</span></div><div class="top"><div class="back" onclick="location.href='./parent-app-vocab-career.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div class="title">勋章馆</div><div class="ph"></div></div><div class="content"><div class="hero"><div class="num">18 <span>/ 32</span></div><div class="label">已收集勋章</div><div class="bar"><div class="fill"></div></div></div><div class="section"><div class="section-h">已获得勋章 <span class="pill">18枚</span></div><div class="grid" id="on"></div></div><div class="section"><div class="section-h">未获得勋章 <span class="pill">14枚待解锁</span></div><div class="grid" id="lock"></div></div></div><div class="toast" id="toast"></div></div>
<script>
const got=[['🏆','初识百词','2022.10.15','gold'],['💪','五百词达人','2023.03.20','gold'],['⭐','千词突破','2023.09.05','gold'],['🎉','两千词大关','2024.08.12','gold'],['🌟','一周坚持','2022.09.08','purple'],['🔥','月度达人','2024.11.02','purple'],['⚡','持之以恒','2025.05.20','purple'],['👍','初具规模','2024.01.18','green'],['🏅','扎实功底','2025.02.10','green'],['✅','中考全达标','2024.06.20','blue'],['🚀','高考词汇过半','2024.12.08','blue'],['📝','名词变形入门','2024.09.15','purple'],['💬','日常交际达人','2025.01.10','green'],['📘','文化学者','2025.03.22','green'],['🏁','月度最佳','2024.03','blue'],['💫','超越自我','2025.01','blue'],['🎯','听写稳定王','2025.04.02','green'],['✨','运用小能手','2025.04.28','purple']];
const wait=[['💎','三千词宗师','还差140词'],['👑','万词之巅','还差2140词'],['👑','百日之王','还差55天'],['🌟','全年无休','最高纪录45天'],['🌟','融会贯通','当前82%'],['🥇','满分掌控','当前82%'],['🏆','高考全达标','当前62%'],['🛠','动词变形达人','过去式74%'],['🥇','全形态精通','副词65%'],['🔬','科技先锋','当前55%'],['🌐','全话题通','2个话题低于75%'],['🌈','单周百词','最高68词/周'],['🏆','学期MVP','当前前22%'],['🏖','假期不掉队','下个假期挑战']];
function card(x,locked){return `<div class="card ${locked?'lock':'on'}" onclick="show('${x[1]}')">${locked?'':'<div class="share">↗</div>'}<div class="medal ${locked?'gray':x[3]}">${x[0]}</div><div class="name">${x[1]}</div><div class="date">${x[2]}</div></div>`}document.getElementById('on').innerHTML=got.map(x=>card(x,false)).join('');document.getElementById('lock').innerHTML=wait.map(x=>card(x,true)).join('');function show(n){const t=document.getElementById('toast');t.textContent=n;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)}
</script>
</body>
</html>
