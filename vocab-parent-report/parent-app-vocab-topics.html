<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>核心词掌握详情 - 词汇生涯</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4F6EF7;--primary-light:#EEF1FE;--danger:#E95B5B;--danger-light:#FEF0F0;
  --success:#34C759;--success-light:#EDFBF2;--warning:#F5A623;--warning-light:#FFF8EC;
  --purple:#7C5CFC;--text:#1A1A2E;--text-secondary:#6B7280;--text-tertiary:#9CA3AF;
  --bg:#F5F6FA;--card:#FFFFFF;--border:#E5E7EB;--radius:14px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#1A1A2E;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0}
.device{width:390px;height:844px;border-radius:44px;overflow:hidden;background:var(--bg);position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.status-bar{height:54px;background:#fff;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:14px;font-weight:600}
.status-bar .time{font-size:15px}
.status-bar .icons{display:flex;gap:6px;align-items:center}
.status-bar .icons span{font-size:12px}
.top-bar{background:#fff;padding:0 16px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.top-bar .back{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.top-bar .back svg{width:20px;height:20px;color:var(--text)}
.top-bar .title{font-size:17px;font-weight:600;color:var(--text)}
.top-bar .placeholder{width:32px}
.content{height:calc(844px - 54px - 53px);overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;padding:16px;padding-bottom:24px}
.content::-webkit-scrollbar{display:none}

/* Overall summary card */
.summary{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.sm-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.sm-num .sm-cur{font-size:28px;font-weight:800;color:var(--text)}
.sm-num .sm-tot{font-size:13px;color:var(--text-tertiary);margin-left:4px}
.sm-label{font-size:12px;color:var(--text-secondary)}
.sm-bar{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;display:flex;margin-bottom:12px}
.sm-bar .seg{height:100%}
.sm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sm-stat{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:var(--bg);border-radius:8px}
.sm-stat .ss-dot{width:8px;height:8px;border-radius:50%}
.sm-stat .ss-num{font-size:16px;font-weight:700}
.sm-stat .ss-lbl{font-size:10px;color:var(--text-tertiary)}

/* Explanation callout */
.explain{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--primary-light);border-radius:var(--radius-sm);margin-bottom:14px;font-size:11px;color:var(--text-secondary);line-height:1.5}
.explain svg{flex-shrink:0;color:var(--primary);margin-top:1px}
.explain b{color:var(--text)}

/* Category block */
.cat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.cat-head{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.cat-icon{font-size:24px;flex-shrink:0;line-height:1.2}
.cat-info{flex:1;min-width:0}
.cat-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cat-name{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.cat-sub{font-size:10px;color:var(--text-tertiary);font-weight:400;background:var(--bg);padding:1px 6px;border-radius:8px}
.cat-mc{font-size:13px;font-weight:700;color:var(--text)}
.cat-mc i{font-size:11px;color:var(--text-tertiary);font-weight:400;font-style:normal}
.cat-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;display:flex;margin-bottom:8px}
.cat-bar .seg{height:100%}
.cat-stats{display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary)}
.cat-stats span{display:flex;align-items:center;gap:3px}
.cat-stats i{width:6px;height:6px;border-radius:50%;display:inline-block}
.cat-stats b{font-weight:700;color:var(--text-secondary);margin-left:1px}
.cat-chev{width:20px;height:20px;color:var(--text-tertiary);flex-shrink:0;transition:transform 0.3s ease;margin-top:4px}
.cat.open .cat-chev{transform:rotate(180deg)}

/* Sub-topic list */
.cat-body{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1)}
.sub-list{padding:0 16px 12px}
.sub-row{padding:12px 0;border-top:1px solid var(--border)}
.sr-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sr-name{font-size:13px;font-weight:500;color:var(--text)}
.sr-mc{font-size:12px;font-weight:700;color:var(--text)}
.sr-mc i{font-size:10px;color:var(--text-tertiary);font-weight:400;font-style:normal}
.sr-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;display:flex;margin-bottom:6px}
.sr-seg{height:100%;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.sr-count{display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary)}
.sr-count span{display:flex;align-items:center;gap:3px}
.sr-count i{width:5px;height:5px;border-radius:50%;display:inline-block}
.sr-count b{font-weight:700;color:var(--text-secondary)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp 0.4s ease both}
</style>
</head>
<body>
<div class="device">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons"><span>5G</span>
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A2E"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A2E"/><rect x="9" y="0" width="3" height="12" rx="1" fill="#1A1A2E"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="#1A1A2E" opacity="0.3"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0.5" y="0.5" width="19" height="11" rx="2" stroke="#1A1A2E" fill="none"/><rect x="20" y="3.5" width="2" height="5" rx="1" fill="#1A1A2E"/><rect x="2" y="2" width="14" height="8" rx="1" fill="#34C759"/></svg>
    </div>
  </div>

  <div class="top-bar">
    <div class="back" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>
    <span class="title">核心词掌握详情</span>
    <div class="placeholder"></div>
  </div>

  <div class="content">
    <!-- Overall summary -->
    <div class="summary animate-in" id="summary"></div>

    <!-- Categories will be rendered here -->
    <div id="catList"></div>

  </div>
</div>

<script>
// data: each sub-topic [name, mastered, two, one, none]
const CATS=[
  {icon:'\u{1F9D1}',name:'\u4eba\u4e0e\u81ea\u6211',subs:[
    ['\u65e5\u5e38\u751f\u6d3b',168,18,9,5],
    ['\u4e2a\u4eba\u57fa\u672c\u4fe1\u606f',142,12,7,4],
    ['\u5bb6\u5ead\u4e0e\u793e\u533a',128,16,10,8],
    ['\u5b66\u6821\u751f\u6d3b',136,24,16,14],
    ['\u5b66\u4e60\u4e0e\u6210\u957f',118,22,15,18],
    ['\u8bed\u8a00\u5b66\u4e60',96,20,14,16],
    ['\u60c5\u7eea\u4e0e\u611f\u53d7',88,18,12,14],
    ['\u6027\u683c\u4e0e\u54c1\u8d28',82,16,12,16],
    ['\u6001\u5ea6\u4e0e\u89c2\u70b9\u8868\u8fbe',74,18,14,22],
    ['\u601d\u7ef4\u4e0e\u903b\u8f91',66,16,14,24],
    ['\u884c\u4e3a\u4e0e\u52a8\u4f5c',92,14,10,12],
    ['\u4f53\u8c8c\u7279\u5f81',78,12,9,11],
    ['\u5f62\u6001\u72b6\u6001\u4e0e\u7279\u70b9',58,14,12,20],
    ['\u5b58\u5728\u4e0e\u53d8\u5316',52,13,12,23],
    ['\u5de5\u4f5c\u4e0e\u804c\u4e1a',64,18,15,28]
  ]},
  {icon:'\u{1F30D}',name:'\u4eba\u4e0e\u793e\u4f1a',subs:[
    ['\u793e\u4f1a\u4ea4\u5f80',96,16,11,13],
    ['\u4e60\u4fd7\u8282\u65e5\u4e0e\u6d3b\u52a8',88,18,12,16],
    ['\u996e\u98df',82,14,10,12],
    ['\u4ea4\u901a',78,16,12,18],
    ['\u65c5\u6e38',72,15,13,20],
    ['\u4f53\u80b2\u4e0e\u8fd0\u52a8',68,16,13,21],
    ['\u6587\u5b66\u4e0e\u5a31\u4e50',74,18,14,24],
    ['\u827a\u672f',58,14,12,22],
    ['\u5efa\u7b51\u4e0e\u8bbe\u65bd',52,13,11,20],
    ['\u56fd\u5bb6\u4e0e\u5730\u533a',56,15,13,26],
    ['\u4eba\u6587\u5386\u53f2\u4e0e\u793e\u4f1a',48,14,13,30],
    ['\u5065\u5eb7\u4e0e\u533b\u7597',46,14,13,32],
    ['\u7ecf\u6d4e',42,13,12,33],
    ['\u79d1\u5b66\u4e0e\u6280\u672f',44,14,14,38]
  ]},
  {icon:'\u{1F33F}',name:'\u4eba\u4e0e\u81ea\u7136',subs:[
    ['\u52a8\u690d\u7269',86,15,10,11],
    ['\u5929\u6c14\u4e0e\u81ea\u7136\u707e\u5bb3',72,14,11,15],
    ['\u65f6\u95f4\u4e0e\u7a7a\u95f4',78,13,9,10],
    ['\u8ba1\u91cf',64,14,12,18],
    ['\u4eba\u7c7b\u81ea\u7136\u4e0e\u73af\u5883',56,15,13,22],
    ['\u5730\u7403\u4e0e\u5b87\u5b99',48,14,13,27]
  ]}
];

function pct(part,total){ return total>0 ? (part/total*100) : 0; }

function renderSummary(){
  let M=0,W=0,O=0,N=0,subCount=0;
  CATS.forEach(c=>c.subs.forEach(s=>{M+=s[1];W+=s[2];O+=s[3];N+=s[4];subCount++;}));
  const total=M+W+O+N;
  const mP=pct(M,total).toFixed(1);
  const root=document.getElementById('summary');
  root.innerHTML=`
    <div class="sm-top">
      <div class="sm-num"><span class="sm-cur">${M}</span><span class="sm-tot">/ ${total} 词</span></div>
      <div class="sm-label">核心词已掌握 · ${mP}%</div>
    </div>
    <div class="sm-bar">
      <div class="seg" style="width:${pct(M,total)}%;background:#34C759"></div>
      <div class="seg" style="width:${pct(W,total)}%;background:#F5A623"></div>
      <div class="seg" style="width:${pct(O,total)}%;background:#4F6EF7"></div>
    </div>
    <div class="sm-stats">
      <div class="sm-stat"><span class="ss-dot" style="background:#34C759"></span><span class="ss-num" style="color:var(--success)">${M}</span><span class="ss-lbl">掌握</span></div>
      <div class="sm-stat"><span class="ss-dot" style="background:#F5A623"></span><span class="ss-num" style="color:var(--warning)">${W}</span><span class="ss-lbl">练2项</span></div>
      <div class="sm-stat"><span class="ss-dot" style="background:#4F6EF7"></span><span class="ss-num" style="color:var(--primary)">${O}</span><span class="ss-lbl">练1项</span></div>
      <div class="sm-stat"><span class="ss-dot" style="background:#E5E7EB"></span><span class="ss-num" style="color:var(--text-tertiary)">${N}</span><span class="ss-lbl">未练</span></div>
    </div>`;
}

function render(){
  const root=document.getElementById('catList');
  let delay=0.08;
  CATS.forEach((cat)=>{
    let tM=0,tW=0,tO=0,tN=0;
    cat.subs.forEach(s=>{tM+=s[1];tW+=s[2];tO+=s[3];tN+=s[4]});
    const total=tM+tW+tO+tN;
    const mP=pct(tM,total), wP=pct(tW,total), oP=pct(tO,total);

    let subsHtml='';
    cat.subs.forEach(s=>{
      const t=s[1]+s[2]+s[3]+s[4];
      const a=pct(s[1],t), b=pct(s[2],t), c=pct(s[3],t);
      subsHtml+=`
        <div class="sub-row">
          <div class="sr-head">
            <span class="sr-name">${s[0]}</span>
            <span class="sr-mc">${s[1]}<i>/${t}</i></span>
          </div>
          <div class="sr-bar">
            <div class="sr-seg" style="width:${a}%;background:#34C759"></div>
            <div class="sr-seg" style="width:${b}%;background:#F5A623"></div>
            <div class="sr-seg" style="width:${c}%;background:#4F6EF7"></div>
          </div>
          <div class="sr-count">
            <span><i style="background:#34C759"></i>掌握 <b>${s[1]}</b></span>
            <span><i style="background:#F5A623"></i>练2项 <b>${s[2]}</b></span>
            <span><i style="background:#4F6EF7"></i>练1项 <b>${s[3]}</b></span>
            <span><i style="background:#E5E7EB"></i>未练 <b>${s[4]}</b></span>
          </div>
        </div>`;
    });

    const block=document.createElement('div');
    block.className='cat animate-in';
    block.style.animationDelay=delay+'s';
    delay+=0.06;
    block.innerHTML=`
      <div class="cat-head" onclick="toggleCat(this)">
        <span class="cat-icon">${cat.icon}</span>
        <div class="cat-info">
          <div class="cat-row1">
            <div class="cat-name">${cat.name}<span class="cat-sub">${cat.subs.length}个话题</span></div>
            <span class="cat-mc">${tM}<i>/${total}</i></span>
          </div>
          <div class="cat-bar">
            <div class="seg" style="width:${mP}%;background:#34C759"></div>
            <div class="seg" style="width:${wP}%;background:#F5A623"></div>
            <div class="seg" style="width:${oP}%;background:#4F6EF7"></div>
          </div>
          <div class="cat-stats">
            <span><i style="background:#34C759"></i>掌握 <b>${tM}</b></span>
            <span><i style="background:#F5A623"></i>练2项 <b>${tW}</b></span>
            <span><i style="background:#4F6EF7"></i>练1项 <b>${tO}</b></span>
            <span><i style="background:#E5E7EB"></i>未练 <b>${tN}</b></span>
          </div>
        </div>
        <svg class="cat-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="cat-body"><div class="sub-list">${subsHtml}</div></div>`;
    root.appendChild(block);
  });
  const first=root.querySelector('.cat');
  if(first){ first.classList.add('open'); const body=first.querySelector('.cat-body'); body.style.maxHeight=body.scrollHeight+'px'; }
}

function toggleCat(head){
  const cat=head.parentElement;
  const body=cat.querySelector('.cat-body');
  const isOpen=cat.classList.contains('open');
  if(isOpen){
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>{ body.style.maxHeight='0px'; });
    cat.classList.remove('open');
  }else{
    cat.classList.add('open');
    body.style.maxHeight=body.scrollHeight+'px';
    setTimeout(()=>{ if(cat.classList.contains('open')) body.style.maxHeight='none'; },420);
  }
}

renderSummary();
render();
</script>
</body>
</html>
