<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>课标词掌握详情 - 词汇生涯</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--primary:#4F6EF7;--success:#34C759;--warning:#F5A623;--danger:#E95B5B;--text:#1A1A2E;--sub:#6B7280;--muted:#9CA3AF;--bg:#F5F6FA;--card:#fff;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.06)}body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#1A1A2E;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0}.device{width:390px;height:844px;border-radius:44px;overflow:hidden;background:var(--bg);position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}.status{height:54px;background:#fff;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:14px;font-weight:600}.top{height:53px;background:#fff;padding:0 16px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.back{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer}.back svg{width:20px;height:20px}.title{font-size:17px;font-weight:600;color:var(--text)}.ph{width:32px}.content{height:737px;overflow:auto;padding:16px 16px 28px}.content::-webkit-scrollbar{display:none}.explain{display:flex;gap:8px;padding:12px 14px;background:#fff;border-radius:10px;box-shadow:var(--shadow);font-size:11px;line-height:1.55;color:var(--sub);margin-bottom:14px}.explain b{color:var(--text)}.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:#fff;border-radius:10px;box-shadow:var(--shadow)}.lg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--sub)}.dot{width:10px;height:10px;border-radius:2px}.cat{background:#fff;border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}.head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}.icon{font-size:22px}.info{flex:1}.name{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}.tag{font-size:10px;font-weight:400;color:var(--muted);background:var(--bg);border-radius:8px;padding:1px 6px}.meta{display:flex;align-items:center;gap:8px;margin-top:6px}.mini{height:6px;background:var(--bg);border-radius:6px;overflow:hidden;display:flex;flex:1}.seg{height:100%}.pct{font-size:15px;font-weight:800}.chev{width:20px;height:20px;color:var(--muted);transition:.25s}.cat.open .chev{transform:rotate(180deg)}.body{max-height:0;overflow:hidden;transition:max-height .3s ease}.cat.open .body{max-height:1200px}.subs{padding:0 16px 8px}.row{padding:10px 0;border-top:1px solid var(--border)}.rh{display:flex;justify-content:space-between;margin-bottom:6px}.rn{font-size:13px;font-weight:500;color:var(--text)}.rp{font-size:13px;font-weight:800}.bar{height:12px;background:var(--bg);border-radius:6px;overflow:hidden;display:flex;margin-bottom:5px}.counts{display:flex;gap:8px;font-size:9px;color:var(--muted);flex-wrap:wrap}.counts b{font-weight:700}.green{color:var(--success)}.orange{color:var(--warning)}.red{color:var(--danger)}
</style>
</head>
<body>
<div class="device"><div class="status"><span>9:41</span><span>5G</span></div><div class="top"><div class="back" onclick="location.href='./parent-app-vocab-career.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div><div class="title">课标词掌握详情</div><div class="ph"></div></div><div class="content"><div class="explain">ⓘ <span>课标话题分两级，按 <b>人与自我 / 人与社会 / 人与自然</b> 三大主题归类。点击主题可展开查看下属话题。单词的 <b>跟读、听默写、运用</b> 三项练习完成几项即归入对应分段。</span></div><div class="legend"><div class="lg"><span class="dot" style="background:#34C759"></span>掌握</div><div class="lg"><span class="dot" style="background:#F5A623"></span>已经2项</div><div class="lg"><span class="dot" style="background:#4F6EF7"></span>已经1项</div><div class="lg"><span class="dot" style="background:#E5E7EB"></span>未练习</div></div><div id="cats"></div></div></div>
<script>
const cats=[{icon:'🧑',name:'人与自我',subs:[['日常生活',168,18,9,5],['个人基本信息',142,12,7,4],['家庭与社区',128,16,10,8],['学校生活',136,24,16,14],['学习与成长',118,22,15,18],['语言学习',96,20,14,16],['情绪与感受',88,18,12,14],['性格与品质',82,16,12,16],['态度与观点表达',74,18,14,22],['思维与逻辑',66,16,14,24],['行为与动作',92,14,10,12],['体貌特征',78,12,9,11],['形态状态与特点',58,14,12,20],['存在与变化',52,13,12,23],['工作与职业',64,18,15,28]]},{icon:'🌍',name:'人与社会',subs:[['社会交往',96,16,11,13],['习俗节日与活动',88,18,12,16],['饮食',82,14,10,12],['交通',78,16,12,18],['旅游',72,15,13,20],['体育与运动',68,16,13,21],['文学与娱乐',74,18,14,24],['艺术',58,14,12,22],['建筑与设施',52,13,11,20],['国家与地区',56,15,13,26],['人文历史与社会',48,14,13,30],['健康与医疗',46,14,13,32],['经济',42,13,12,33],['科学与技术',44,14,14,38]]},{icon:'🌿',name:'人与自然',subs:[['动植物',86,15,10,11],['天气与自然灾害',72,14,11,15],['时间与空间',78,13,9,10],['计量',64,14,12,18],['人类自然与环境',56,15,13,22],['地球与宇宙',48,14,13,27]]}];
function c(p){return p>=80?'green':p>=60?'orange':'red'}function block(cat,i){let m=0,w=0,o=0,n=0;cat.subs.forEach(s=>{m+=s[1];w+=s[2];o+=s[3];n+=s[4]});const t=m+w+o+n,p=Math.round(m/t*100);let rows=cat.subs.map(s=>{const total=s[1]+s[2]+s[3]+s[4],pp=Math.round(s[1]/total*100),a=s[1]/total*100,b=s[2]/total*100,d=s[3]/total*100;return `<div class="row"><div class="rh"><span class="rn">${s[0]}</span><span class="rp ${c(pp)}">${pp}%</span></div><div class="bar"><div class="seg" style="width:${a}%;background:#34C759"></div><div class="seg" style="width:${b}%;background:#F5A623"></div><div class="seg" style="width:${d}%;background:#4F6EF7"></div></div><div class="counts"><span><b style="color:#34C759">${s[1]}</b> 掌握</span><span><b style="color:#F5A623">${s[2]}</b> 练2项</span><span><b style="color:#4F6EF7">${s[3]}</b> 练1项</span><span><b>${s[4]}</b> 未练</span></div></div>`}).join('');return `<div class="cat ${i===0?'open':''}"><div class="head" onclick="this.parentNode.classList.toggle('open')"><span class="icon">${cat.icon}</span><div class="info"><div class="name">${cat.name}<span class="tag">${cat.subs.length}个话题</span></div><div class="meta"><div class="mini"><div class="seg" style="width:${m/t*100}%;background:#34C759"></div><div class="seg" style="width:${w/t*100}%;background:#F5A623"></div><div class="seg" style="width:${o/t*100}%;background:#4F6EF7"></div></div><span class="pct ${c(p)}">${p}%</span></div></div><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div><div class="body"><div class="subs">${rows}</div></div></div>`}document.getElementById('cats').innerHTML=cats.map(block).join('');
</script>
</body>
</html>
