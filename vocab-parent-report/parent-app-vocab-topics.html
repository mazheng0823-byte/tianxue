<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>课标词掌握情况</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#1A1A2E;min-height:100vh;display:flex;justify-content:center;padding:20px 0;color:#1A1A2E}.device{width:390px;height:844px;background:#F5F6FA;border-radius:44px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}.status{height:54px;background:#fff;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600}.top{height:53px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #E5E7EB}.back{width:32px;height:32px;border-radius:50%;border:0;background:#F5F6FA;font-size:22px;line-height:1;cursor:pointer}.title{font-size:17px;font-weight:700}.content{height:calc(844px - 107px);overflow-y:auto;padding:16px 16px 28px}.summary{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}.summary h1{font-size:18px;margin-bottom:8px}.summary p{font-size:12px;color:#6B7280;line-height:1.6}.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.lg{font-size:10px;color:#6B7280;display:flex;align-items:center;gap:4px}.dot{width:8px;height:8px;border-radius:2px}.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.06)}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.name{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700}.pct{font-size:16px;font-weight:800}.bar{height:16px;background:#F5F6FA;border-radius:8px;overflow:hidden;display:flex}.seg{height:100%}.meta{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:#9CA3AF}.good{color:#34C759}.mid{color:#F5A623}.weak{color:#E95B5B}.tip{font-size:11px;color:#6B7280;background:#EEF1FE;border-radius:10px;padding:10px;line-height:1.55;margin-bottom:14px}</style>
</head>
<body><div class="device"><div class="status"><span>9:41</span><span>5G ▰</span></div><div class="top"><button class="back" onclick="history.back()">‹</button><div class="title">课标词掌握情况</div><span style="width:32px"></span></div><div class="content"><div class="summary"><h1>12 个课标话题掌握概览</h1><p>按课标词汇所属话题统计掌握情况，帮助家长看清孩子在哪些主题上更稳、哪些主题还需要补练。</p><div class="legend"><span class="lg"><i class="dot" style="background:#34C759"></i>掌握</span><span class="lg"><i class="dot" style="background:#F5A623"></i>已练2项</span><span class="lg"><i class="dot" style="background:#4F6EF7"></i>已练1项</span><span class="lg"><i class="dot" style="background:#E5E7EB"></i>未练习</span></div></div><div class="tip">掌握判定：同一单词完成跟读、听默写、运用三类练习后，才计入掌握。</div><div id="list"></div></div></div><script>
const topics=[['日常交际','💬',92,82,10,5],['文化教育','📘',88,76,12,6],['社会热点','🌍',76,52,16,8],['职业经济','💼',72,48,14,10],['自然环境','🌿',84,68,11,7],['科学技术','🔬',69,42,17,10],['文学艺术','🎨',81,61,13,7],['健康生活','🏃',86,70,9,7],['历史地理','🗺️',74,50,15,9],['情感态度','✨',79,57,14,8],['节日文化','🎉',90,78,8,4],['社会服务','🤝',67,39,18,10]];
function cls(p){return p>=85?'good':p>=70?'mid':'weak'}
document.getElementById('list').innerHTML=topics.map(([n,icon,p,a,b,c])=>{const d=Math.max(0,100-a-b-c);return `<div class="card"><div class="head"><div class="name"><span>${icon}</span>${n}</div><div class="pct ${cls(p)}">${p}%</div></div><div class="bar"><div class="seg" style="width:${a}%;background:#34C759"></div><div class="seg" style="width:${b}%;background:#F5A623"></div><div class="seg" style="width:${c}%;background:#4F6EF7"></div><div class="seg" style="width:${d}%;background:#E5E7EB"></div></div><div class="meta"><span>掌握 ${a}%</span><span>已练2项 ${b}%</span><span>已练1项 ${c}%</span><span>未练 ${d}%</span></div></div>`}).join('');
</script></body></html>
