<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教学班管理 Demo 目录</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(230, 250, 255, .92), rgba(243, 247, 255, .96)),
        #edf6ff;
      color: #163452;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .page {
      min-height: 100vh;
      padding: 56px 64px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .header { max-width: 980px; }
    .eyebrow { margin: 0 0 10px; color: #2d8cff; font-size: 15px; font-weight: 800; }
    h1 { margin: 0; color: #102f50; font-size: 40px; line-height: 1.2; letter-spacing: 0; }
    .sub { margin: 14px 0 0; color: #6f8195; font-size: 18px; line-height: 1.7; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 520px));
      gap: 24px;
      align-items: stretch;
    }
    .entry {
      position: relative;
      min-height: 260px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 18px 45px rgba(37, 90, 140, .12);
      border: 1px solid rgba(211, 228, 246, .95);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .entry:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 58px rgba(37, 90, 140, .18);
      border-color: rgba(45, 140, 255, .45);
    }
    .entry::after {
      content: "";
      position: absolute;
      right: -44px;
      bottom: -58px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(45, 140, 255, .13), rgba(88, 120, 255, .05));
    }
    .tag {
      width: fit-content;
      padding: 7px 13px;
      border-radius: 999px;
      background: #eef5ff;
      color: #2d8cff;
      font-size: 14px;
      font-weight: 800;
    }
    .entry h2 { margin: 24px 0 12px; color: #102f50; font-size: 28px; line-height: 1.25; }
    .entry p { margin: 0; max-width: 370px; color: #687b91; font-size: 16px; line-height: 1.65; }
    .meta {
      position: absolute;
      left: 30px;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #2d8cff;
      font-size: 17px;
      font-weight: 800;
    }
    .arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #2d8cff;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      line-height: 1;
    }
    .footer { color: #8b9aae; font-size: 14px; }
    @media (max-width: 900px) {
      .page { padding: 32px 20px; }
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="eyebrow">教师端教学班管理</p>
      <h1>Demo 目录</h1>
      <p class="sub">这里集中放置本项目当前可访问的演示页面。点击卡片即可进入对应端的页面。</p>
    </header>

    <section class="grid" aria-label="Demo 页面入口">
      <a class="entry" href="./index.html">
        <span class="tag">教师端</span>
        <h2>教学班管理</h2>
        <p>查看教学班列表、创建/编辑教学班、进入成员管理、添加学生，并演示 Excel 导入校验。</p>
        <span class="meta">打开页面 <span class="arrow">›</span></span>
      </a>

      <a class="entry" href="./student-join.html">
        <span class="tag">学生端</span>
        <h2>扫码加入班级</h2>
        <p>学生输入课程码后申请加入班级；当学生机构和班级机构不一致时展示吐司提示。</p>
        <span class="meta">打开页面 <span class="arrow">›</span></span>
      </a>
    </section>

    <div class="footer">目录页仅用于本地演示导航，不影响原页面功能。</div>
  </main>
</body>
</html>
