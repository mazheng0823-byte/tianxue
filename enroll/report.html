<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>百舸争流 - 上周报告</title><style>*{box-sizing:border-box}body{margin:0;background:#f8f9fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;justify-content:center}.app{position:relative;width:min(100vw,375px);height:100vh;overflow:hidden;background:#6c5ce7;color:#fff}.progress{position:fixed;top:0;left:50%;width:min(100vw,375px);z-index:2;transform:translateX(-50%);padding:12px 16px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.15);backdrop-filter:blur(8px)}.close{border:0;background:transparent;color:#fff;font-size:24px}.bars{flex:1;display:flex;gap:3px}.bar{height:3px;flex:1;border-radius:2px;background:rgba(255,255,255,.3)}.bar.on{background:#fff}.num{font-size:12px;opacity:.8}.screen{height:100vh;padding:70px 24px 86px;display:flex;align-items:center;justify-content:center;text-align:center}.big{font-size:80px;font-weight:900;line-height:1;text-shadow:0 4px 20px rgba(0,0,0,.22)}.label{margin-top:10px;font-size:20px;font-weight:800}.sub{margin-top:5px;font-size:15px;opacity:.78}.cards{margin-top:28px;display:grid;gap:10px}.card{padding:12px;border-radius:14px;text-align:left;background:rgba(255,255,255,.16);backdrop-filter:blur(8px)}.cardHead{display:flex;justify-content:space-between;gap:10px}.card b{font-size:13px}.card span{display:block;margin-top:3px;font-size:11px;opacity:.75}.track{height:7px;margin-top:8px;border-radius:999px;background:rgba(255,255,255,.22);overflow:hidden}.fill{height:100%;background:#fff}.stats{margin-top:36px;display:flex;justify-content:center;gap:28px}.stat b{font-size:22px}.stat span{display:block;font-size:12px;opacity:.72}.share{position:absolute;left:50%;bottom:42px;transform:translateX(-50%);width:172px;height:42px;border:1px solid rgba(255,255,255,.45);border-radius:999px;color:#fff;background:rgba(255,255,255,.18);font-weight:900}.cta{width:260px;border:0;border-radius:28px;padding:14px 24px;background:#e84393;color:#fff;font-size:16px;font-weight:900}.secondary{width:260px;margin-top:12px;border:1px solid rgba(255,255,255,.45);border-radius:24px;padding:12px;color:#fff;background:rgba(255,255,255,.18);font-weight:900}.shareMask{position:fixed;inset:0;left:50%;width:min(100vw,375px);display:none;align-items:flex-end;background:rgba(0,0,0,.45);transform:translateX(-50%)}.shareMask.show{display:flex}.sheet{width:100%;padding:18px;border-radius:24px 24px 0 0;background:#fff;color:#1f2433}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions button{border:1px solid #edf0f5;border-radius:16px;padding:14px;background:#f8f9fa;font-weight:900}.hint{position:fixed;left:50%;bottom:18px;width:min(100vw,375px);transform:translateX(-50%);text-align:center;font-size:12px;opacity:.58}</style></head><body><main class="app"><div class="progress"><button class="close" onclick="location.href='./'">×</button><div class="bars" id="bars"></div><span class="num" id="num">1/5</span></div><section class="screen" id="screen"></section><div class="hint" id="hint">点击左右两侧切换</div></main><div class="shareMask" id="shareMask" onclick="if(event.target.id==='shareMask')hideShare()"><div class="sheet"><h3>分享这页战报</h3><p>可分享到微信聊天或朋友圈。</p><div class="actions"><button onclick="sharePage('微信聊天')">微信聊天</button><button onclick="sharePage('朋友圈')">朋友圈</button></div><button class="secondary" style="color:#667085;background:#f1f3f6;border:0;width:100%;margin-top:12px" onclick="hideShare()">取消</button></div></div><script>let page=0;const data={correct:36,rank:128,score:Number(localStorage.getItem('raceScore')||48),combo:6};const bgs=['linear-gradient(135deg,#6C5CE7,#A29BFE)','linear-gradient(135deg,#00B894,#55EFC4)','linear-gradient(135deg,#E84393,#FD79A8)','linear-gradient(135deg,#0984E3,#74B9FF)','linear-gradient(135deg,#FDCB6E,#FFEAA7)'];function shareBtn(){return page<4?'<button class="share" onclick="event.stopPropagation();showShare()">分享</button>':''}function render(){document.querySelector('.app').style.background=bgs[page];bars.innerHTML=Array.from({length:5},(_,i)=>`<i class="bar ${i<=page?'on':''}"></i>`).join('');num.textContent=(page+1)+'/5';hint.style.display=page<4?'block':'none';const pages=[`<div><div class="big">${data.correct}</div><div class="label">本周期你答对了</div><div class="sub">个英语单词</div><div class="cards"><div class="card"><div class="cardHead"><div><b>初中 · 课标1600词</b><span>答对 24 词 · 已掌握 9 词</span></div><strong>25%</strong></div><div class="track"><div class="fill" style="width:25%"></div></div></div><div class="card"><div class="cardHead"><div><b>初中 · 新概念2</b><span>答对 12 词 · 已掌握 5 词</span></div><strong>18%</strong></div><div class="track"><div class="fill" style="width:18%"></div></div></div></div></div>${shareBtn()}`,`<div><div style="font-size:56px">🚣</div><div class="big" style="font-size:54px">第 ${data.rank} 名</div><div class="label">本周当前排名</div><div class="sub">本组 180 人中</div><div class="stats"><div class="stat"><b>第 118 名</b><span>最高排名</span></div><div class="stat"><b>${data.score}</b><span>总积分</span></div></div></div>${shareBtn()}`,`<div><div style="font-size:56px">🔥</div><div class="big" style="font-size:64px">${data.combo}</div><div class="label">最高连对</div><div class="stats"><div class="stat"><b>2</b><span>进入 Combo</span></div><div class="stat"><b>12+</b><span>Combo 加成</span></div></div></div>${shareBtn()}`,`<div><div style="font-size:56px">📅</div><div class="big" style="font-size:54px">周三</div><div class="label">最强背词日</div><div class="stats"><div class="stat"><b>18</b><span>单日答对</span></div></div></div>${shareBtn()}`,`<div><div style="font-size:56px">🌟</div><h2>每天多会一点点，下一次就会更从容。</h2><button class="cta" onclick="event.stopPropagation();location.href='boat-race.html'">继续参赛</button><br><button class="secondary" onclick="event.stopPropagation();location.href='./'">返回首页</button></div>`];screen.innerHTML=pages[page]}function next(){if(page<4){page++;render()}}function prev(){if(page>0){page--;render()}}screen.addEventListener('click',e=>{const x=e.clientX-screen.getBoundingClientRect().left;x<screen.offsetWidth*.3?prev():next()});function showShare(){shareMask.classList.add('show')}function hideShare(){shareMask.classList.remove('show')}async function sharePage(t){const text='我在百舸争流本周战报：答对 '+data.correct+' 词，当前第 '+data.rank+' 名。';if(navigator.share){try{await navigator.share({title:'百舸争流战报',text,url:location.href})}catch(e){}}else if(navigator.clipboard){await navigator.clipboard.writeText(text+' '+location.href);alert('分享文案已复制，可发送到'+t)}hideShare()}render();</script></body></html>
