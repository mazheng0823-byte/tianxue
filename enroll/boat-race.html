<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>百舸争流 - 比赛</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;justify-content:center;color:#1f2433}.app{position:relative;width:min(100vw,375px);height:100vh;overflow:hidden;background:linear-gradient(180deg,#8fd8ff,#50c4dc 55%,#9be4d6)}.water{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 25%,rgba(255,255,255,.32),transparent 25%),radial-gradient(ellipse at 80% 70%,rgba(255,255,255,.22),transparent 28%)}.header{position:relative;z-index:2;height:64px;padding:12px 14px;display:flex;align-items:center;color:#fff}.back{width:36px;height:36px;border:0;border-radius:10px;background:rgba(255,255,255,.22);color:#fff;font-size:24px}.info{flex:1;margin-left:10px}.title{font-size:15px;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.2)}.time{font-size:12px;opacity:.9}.icons{display:flex;gap:6px}.icon{width:36px;height:36px;border:0;border-radius:10px;background:rgba(255,255,255,.22);color:#fff}.arena{position:absolute;left:0;right:0;top:72px;bottom:212px}.boat{position:absolute;width:84px;text-align:center;transition:transform .5s,left .5s}.rank{display:inline-block;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.9);color:#0984e3;font-size:11px;font-weight:800}.score{display:block;color:#0b75bd;font-size:18px;font-weight:900}.ship{width:42px;height:86px;margin:2px auto;border-radius:22px 22px 14px 14px;background:linear-gradient(180deg,#ff7675,#b33939);box-shadow:0 6px 12px rgba(0,0,0,.18);position:relative}.ship:before{content:'';position:absolute;left:10px;right:10px;top:12px;bottom:10px;border-radius:16px;background:rgba(255,255,255,.28)}.ship:after{content:'';position:absolute;left:17px;top:27px;width:8px;height:8px;border-radius:50%;background:#ffeaa7}.name{display:inline-block;margin-top:3px;padding:2px 8px;border-radius:8px;background:rgba(0,0,0,.2);color:#fff;font-size:11px}.me .ship{background:linear-gradient(180deg,#e84393,#fd79a8)}.me .rank{background:#e84393;color:#fff}.panel{position:absolute;left:0;right:0;bottom:0;z-index:3;height:212px;padding:14px 16px 22px;border-radius:24px 24px 0 0;background:rgba(255,255,255,.82);backdrop-filter:blur(16px);box-shadow:0 -8px 26px rgba(0,0,0,.12)}.top{display:flex;justify-content:space-between;align-items:center}.points{color:#667085;font-size:13px}.points b{color:#0984e3;font-size:20px}.myrank{padding:4px 10px;border-radius:10px;background:rgba(232,67,147,.12);color:#e84393;font-weight:900}.word{text-align:center;margin:18px 0 14px;font-size:30px;font-weight:900}.choices{display:flex;gap:12px}.choice{flex:1;min-height:58px;border:2px solid rgba(0,0,0,.08);border-radius:14px;background:#fff;font-size:17px;font-weight:900}.choice.correct{border-color:#00b894;color:#00b894;background:rgba(0,184,148,.12)}.choice.wrong{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.12)}.next{display:none;width:100%;margin-top:10px;border:0;border-radius:14px;padding:13px;color:#fff;background:#0984e3;font-weight:900}.next.show{display:block}.drawer{position:absolute;inset:0;z-index:9;display:none;background:rgba(0,0,0,.42)}.drawer.show{display:block}.drawerPanel{position:absolute;right:0;top:0;bottom:0;width:82%;background:#fff;padding:16px;overflow:auto}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eef1f5}.progress{height:10px;border-radius:8px;background:#eef1ff;overflow:hidden}.bar{height:100%;width:38%;background:linear-gradient(90deg,#6c5ce7,#00b894)}
</style>
</head>
<body><main class="app"><div class="water"></div><header class="header"><button class="back" onclick="location.href='./'">‹</button><div class="info"><div class="title" id="title">本周大赛 · 初中 · 课标1600词</div><div class="time">距结算 3天4时 · 今日剩 57:06</div></div><div class="icons"><button class="icon" onclick="showDrawer('progress')">📊</button><button class="icon" onclick="showDrawer('rank')">🏆</button></div></header><section class="arena" id="arena"></section><section class="panel"><div class="top"><span class="points">已得 <b id="score">0</b> 分</span><span class="myrank" id="rank">#128</span></div><div class="word" id="word">necessary</div><div class="choices" id="choices"></div><button class="next" id="next" onclick="nextQ()">下一个</button></section><div class="drawer" id="rankDrawer" onclick="if(event.target.id==='rankDrawer')hideDrawer('rank')"><div class="drawerPanel"><h3>🏆 排行榜</h3><div id="rankList"></div></div></div><div class="drawer" id="progressDrawer" onclick="if(event.target.id==='progressDrawer')hideDrawer('progress')"><div class="drawerPanel"><h3>📊 词库进度</h3><p id="currentBook">初中 · 课标1600词</p><div class="progress"><div class="bar"></div></div><p>已掌握 14 / 36 词</p><p style="color:#8a93a3;font-size:13px">绿色代表已掌握，蓝色代表已答对，红色代表错词。</p></div></div></main><script>
const words=[['necessary','必要的'],['accept','接受'],['culture','文化'],['popular','流行的'],['protect','保护'],['complete','完成'],['energy','能量'],['history','历史']];let score=Number(localStorage.getItem('raceScore')||0),idx=0,locked=false;const entry=JSON.parse(localStorage.getItem('enrollRaceEntry')||'{}');if(entry.wordbookName)title.textContent='本周大赛 · '+entry.wordbookName,currentBook.textContent=entry.wordbookName;const racers=['何*静','林*芳','我','郭*娜','梁*琳'];function renderArena(){arena.innerHTML=racers.map((n,i)=>`<div class="boat ${n==='我'?'me':''}" style="left:${[55,18,40,12,70][i]}%;top:${[8,26,44,64,34][i]}%"><span class="rank">第${126+i}名</span><span class="score">${Math.max(0,score+[6,3,0,-3,-6][i])}</span><div class="ship"></div><span class="name">${n}</span></div>`).join('')}function renderRank(){rankList.innerHTML=Array.from({length:20},(_,i)=>`<div class="row"><b>#${i+1}</b><span>${i===12?'我':'同学'+(i+1)}</span><strong>${Math.max(0,80-i*3+score)}</strong></div>`).join('')}function renderQ(){locked=false;next.classList.remove('show');scoreEl();let w=words[idx%words.length];word.textContent=w[0];let wrong=words[(idx+2)%words.length][1];let opts=Math.random()>.5?[w[1],wrong]:[wrong,w[1]];choices.innerHTML=opts.map(o=>`<button class="choice" onclick="answer(this,'${o}', '${w[1]}')">${o}</button>`).join('')}function scoreEl(){document.getElementById('score').textContent=score;document.getElementById('rank').textContent='#'+Math.max(1,128-Math.floor(score/9))}function answer(btn,val,right){if(locked)return;locked=true;document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===right)b.classList.add('correct')});if(val===right){score+=3;localStorage.setItem('raceScore',score);renderArena()}else btn.classList.add('wrong');scoreEl();next.classList.add('show')}function nextQ(){idx++;renderQ()}function showDrawer(t){renderRank();document.getElementById(t+'Drawer').classList.add('show')}function hideDrawer(t){document.getElementById(t+'Drawer').classList.remove('show')}renderArena();renderRank();renderQ();
</script></body></html>
