<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>百舸争流 - 报名</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f6f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#1f2433;display:flex;justify-content:center}.app{width:min(100vw,375px);min-height:100vh;background:linear-gradient(180deg,#fbfbff,#f4f7fb);padding-bottom:96px}.header{height:56px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);border-bottom:1px solid #edf0f5;font-weight:800}.hero{text-align:center;padding:34px 24px 18px}.boat{width:92px;height:92px;margin:0 auto 16px;border-radius:28px;display:grid;place-items:center;font-size:44px;background:linear-gradient(145deg,#fff,#edf1ff);box-shadow:0 18px 38px rgba(86,103,255,.16)}h1{margin:0;font-size:28px}.sub{margin:10px 0 0;color:#6f7787;font-size:14px}.card{margin:14px 16px;padding:18px;border-radius:20px;background:#fff;box-shadow:0 8px 24px rgba(29,40,70,.08)}.entry{width:100%;border:0;border-radius:18px;padding:16px;display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,rgba(86,103,255,.12),rgba(30,160,255,.08));text-align:left;color:inherit}.icon{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;color:#fff;font-weight:900;background:linear-gradient(135deg,#6c5ce7,#0984e3)}.main{flex:1}.main b{display:block;font-size:15px}.main span{display:block;margin-top:4px;color:#6f7787;font-size:12px}.arrow{color:#6c5ce7;font-size:24px}.rules{margin:0;padding:0;list-style:none;display:grid;gap:10px}.rules li{padding:11px 12px;border-radius:13px;background:#f8f9ff;color:#667085;font-size:13px}.rules strong{color:#1f2433}.bottom{position:fixed;left:50%;bottom:0;width:min(100vw,375px);transform:translateX(-50%);padding:16px 18px 20px;background:linear-gradient(180deg,rgba(246,247,251,0),#f6f7fb 25%)}.btn{width:100%;height:54px;border:0;border-radius:18px;color:#fff;background:linear-gradient(135deg,#6c5ce7,#0984e3);box-shadow:0 16px 28px rgba(86,103,255,.24);font-size:16px;font-weight:900}.hint{text-align:center;color:#8a93a3;font-size:12px}.sheet{position:fixed;inset:0;left:50%;width:min(100vw,375px);transform:translateX(-50%);display:none;align-items:flex-end;background:rgba(0,0,0,.38)}.sheet.show{display:flex}.panel{width:100%;padding:18px 16px 22px;border-radius:24px 24px 0 0;background:#fff}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px;border-radius:14px;background:#f1f3f8}.tabs button,.book{border:0;border-radius:12px;padding:10px;background:transparent;font-weight:800}.tabs .on{background:#fff;color:#6c5ce7}.book{width:100%;margin-top:10px;text-align:left;border:1px solid #edf0f5;background:#fff}.book.on{border-color:#6c5ce7;background:#f6f4ff}.confirm{width:100%;margin-top:14px;border:0;border-radius:16px;padding:14px;color:#fff;background:#6c5ce7;font-weight:900}.report{margin-top:8px;background:#fff}
  </style>
</head>
<body>
<main class="app">
  <div class="header">百舸争流</div>
  <section class="hero"><div class="boat">🚣</div><h1>本周词汇大赛</h1><p class="sub">答对单词得积分 · 每周结算排名</p></section>
  <section class="card"><h3>📚 参赛词表</h3><button class="entry" onclick="openSheet()"><span class="icon">词</span><span class="main"><b id="bookName">初中 · 课标1600词</b><span id="bookDesc">覆盖初中课标核心词，适合基础巩固与冲榜练习</span></span><span class="arrow">›</span></button></section>
  <section class="card report"><h3>📈 上周报告</h3><button class="entry" onclick="location.href='report.html'"><span class="icon">报</span><span class="main"><b>查看上周词汇战报</b><span>答对词数、排名、Combo、高光表现</span></span><span class="arrow">›</span></button></section>
  <section class="card"><h3>📋 积分规则</h3><ul class="rules"><li><strong>答对得分</strong> 每题答对 +3 分</li><li><strong>Combo 加分</strong> 连对 3 题进入 Combo，每题 +6 分</li><li><strong>结算时间</strong> 每周日 20:00 结算排名</li></ul></section>
  <div class="bottom"><button id="join" class="btn" onclick="joinRace()">🏁 参加本周大赛</button><p class="hint">参加后可随时离开，积分保留至周日 20:00 结算</p></div>
</main>
<div id="sheet" class="sheet" onclick="if(event.target.id==='sheet')closeSheet()"><div class="panel"><h3>选择词表</h3><div class="tabs"><button id="juniorTab" class="on" onclick="setStage('junior')">初中</button><button id="seniorTab" onclick="setStage('senior')">高中</button></div><div id="books"></div><button class="confirm" onclick="confirmBook()">确认</button></div></div>
<script>
const books={junior:[['初中 · 课标1600词','覆盖初中课标核心词，适合基础巩固与冲榜练习'],['初中 · 新概念1','适合入门表达与基础句型巩固'],['初中 · 新概念2','适合语法表达和常用词汇进阶'],['初中 · 新概念3','适合长句理解和高频进阶词汇训练'],['初中 · 新概念4','适合高阶阅读词汇和表达积累'],['初中 · 小学词汇','适合基础薄弱学生进行前置补齐']],senior:[['高中 · 课标3100词','覆盖高中课标核心词汇，适合高阶挑战与比赛训练'],['高中 · 4级词汇','适合高中拔高和大学四级前置准备'],['高中 · 6级词汇','适合高阶拓展与竞赛型词汇挑战'],['高中 · 初高衔接词表','适合新高一学生从初中词汇平滑过渡']]};let stage='junior',pending=0,current=JSON.parse(localStorage.getItem('enrollBook')||'null')||books.junior[0];function render(){document.getElementById('bookName').textContent=current[0];document.getElementById('bookDesc').textContent=current[1]}function renderList(){document.getElementById('juniorTab').classList.toggle('on',stage==='junior');document.getElementById('seniorTab').classList.toggle('on',stage==='senior');document.getElementById('books').innerHTML=books[stage].map((b,i)=>`<button class="book ${i===pending?'on':''}" onclick="pending=${i};renderList()"><b>${b[0]}</b><br><small>${b[1]}</small></button>`).join('')}function openSheet(){pending=0;renderList();sheet.classList.add('show')}function closeSheet(){sheet.classList.remove('show')}function setStage(s){stage=s;pending=0;renderList()}function confirmBook(){current=books[stage][pending];localStorage.setItem('enrollBook',JSON.stringify(current));render();closeSheet()}function joinRace(){join.textContent='加入中...';localStorage.setItem('enrollRaceEntry',JSON.stringify({enrolled:true,wordbookName:current[0],joinedAt:new Date().toISOString()}));setTimeout(()=>location.href='boat-race.html',700)}render();
</script>
</body>
</html>
